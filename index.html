<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Vegetables Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .badge { @apply absolute top-2 right-2 bg-green-600 text-white text-xs px-2 py-1 rounded-full font-bold z-10; }
        .tab-btn.active { @apply bg-green-600 text-white shadow-md; }
        .admin-table th, .admin-table td { @apply border border-gray-200 p-2 text-left text-sm; }
    </style>
</head>
<body class="bg-gray-50 font-sans pb-24">

    <!-- Header -->
    <header class="bg-gradient-to-r from-green-600 to-green-700 text-white shadow-lg sticky top-0 z-40">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-black tracking-tight flex items-center gap-2">
                <i class="fa-solid fa-leaf"></i> FRESH VEGETABLES
            </h1>
            <button onclick="toggleAdminModal()" class="text-xs bg-green-800/50 hover:bg-green-800 px-2 py-1 rounded transition">
                <i class="fa-solid fa-lock"></i> Admin
            </button>
        </div>
    </header>

    <!-- Main Container -->
    <main class="max-w-4xl mx-auto px-4 mt-4">
        <!-- Tabs -->
        <div class="flex gap-2 mb-4 overflow-x-auto pb-1" id="tabContainer">
            <button onclick="switchTab('all')" id="tab-all" class="tab-btn active px-4 py-2 rounded-full text-sm font-bold bg-white text-gray-700 shadow-sm whitespace-nowrap transition">All Items</button>
            <button onclick="switchTab('veg')" id="tab-veg" class="tab-btn px-4 py-2 rounded-full text-sm font-bold bg-white text-gray-700 shadow-sm whitespace-nowrap transition">Vegetables</button>
            <button onclick="switchTab('fruit')" id="tab-fruit" class="tab-btn px-4 py-2 rounded-full text-sm font-bold bg-white text-gray-700 shadow-sm whitespace-nowrap transition">Fruits</button>
        </div>

        <!-- Search -->
        <div class="relative mb-6">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-gray-400"></i>
            <input type="text" id="searchInput" oninput="searchItems()" placeholder="Search vegetables, fruits..." class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-200 shadow-sm focus:outline-none focus:ring-2 focus:ring-green-500 text-sm">
        </div>

        <!-- Products Grid -->
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-3" id="productsGrid"></div>
    </main>

    <!-- Floating Cart Bar -->
    <div id="floatingCart" class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] z-40 hidden">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div>
                <span id="cartCount" class="bg-green-100 text-green-800 text-xs font-bold px-2.5 py-1 rounded-full">0 Items</span>
                <div class="text-lg font-black text-gray-800 mt-1">Total: ₹<span id="cartTotal">0.00</span></div>
            </div>
            <button onclick="openCheckout()" class="bg-gradient-to-r from-green-600 to-green-700 text-white font-bold px-6 py-3 rounded-xl shadow-md hover:opacity-90 flex items-center gap-2 transition">
                Order via WhatsApp <i class="fa-brands fa-whatsapp text-lg"></i>
            </button>
        </div>
    </div>

    <!-- Checkout Modal -->
    <div id="checkoutModal" class="fixed inset-0 bg-black/50 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 hidden">
        <div class="bg-white w-full sm:max-w-md rounded-t-2xl sm:rounded-2xl p-6 shadow-xl max-h-[90vh] overflow-y-auto animate-slide-up">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-black text-gray-900">Delivery Details</h3>
                <button onclick="closeCheckout()" class="text-gray-400 hover:text-gray-600 text-xl"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="orderForm" onsubmit="submitOrder(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Name *</label>
                    <input type="text" id="custName" required class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase mb-1">WhatsApp Number *</label>
                    <input type="tel" id="custPhone" required class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Delivery Address *</label>
                    <textarea id="custAddress" required rows="3" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none text-sm"></textarea>
                </div>
                <div class="bg-gray-50 p-3 rounded-lg border border-gray-100">
                    <h4 class="text-xs font-bold text-gray-500 uppercase mb-2">Order Summary</h4>
                    <div id="checkoutSummary" class="text-xs space-y-1 text-gray-700 max-h-32 overflow-y-auto"></div>
                </div>
                <button type="submit" class="w-full bg-green-600 text-white font-bold py-3 rounded-xl shadow-md hover:bg-green-700 transition flex justify-center items-center gap-2">
                    Confirm & Send to WhatsApp <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Admin Modal -->
    <div id="adminModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-3xl rounded-2xl p-6 shadow-xl max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-black text-gray-900">Store Management Portal</h3>
                <button onclick="toggleAdminModal()" class="text-gray-400 hover:text-gray-600 text-xl"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div id="adminAuth">
                <div class="max-w-sm mx-auto text-center py-8 space-y-4">
                    <i class="fa-solid fa-shield-halved text-4xl text-green-600"></i>
                    <p class="text-sm text-gray-600">Enter passcode to access admin settings.</p>
                    <input type="password" id="adminPass" class="w-full p-2.5 border border-gray-300 rounded-lg text-center" placeholder="••••••••">
                    <button onclick="verifyAdmin()" class="w-full bg-green-600 text-white font-bold py-2 rounded-lg">Login</button>
                </div>
            </div>

            <div id="adminContent" class="hidden space-y-6">
                <div class="flex justify-between items-center">
                    <span class="text-xs bg-green-100 text-green-800 px-2 py-1 rounded font-mono">Status: Authenticated</span>
                    <button onclick="generateUpdateCode()" class="bg-blue-600 text-white text-xs font-bold px-3 py-1.5 rounded hover:bg-blue-700">Save & Generate Update Code</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full admin-table border-collapse">
                        <thead>
                            <tr class="bg-gray-50">
                                <th>Item Name</th>
                                <th>Variants (Comma separated)</th>
                                <th>Prices (Comma separated)</th>
                                <th>Image URL</th>
                                <th>Is Fruit?</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="adminTableBody"></tbody>
                    </table>
                </div>
                <button onclick="addAdminRow()" class="text-sm text-green-600 font-bold hover:text-green-700"><i class="fa-solid fa-plus"></i> Add New Item</button>
                
                <div id="outputContainer" class="hidden space-y-2">
                    <label class="block text-xs font-bold text-gray-700 uppercase">Copy this updated database array block:</label>
                    <textarea id="outputArea" readonly rows="6" class="w-full p-2.5 font-mono text-xs bg-gray-900 text-green-400 rounded-lg"></textarea>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript Data and Logic -->
    <script>
        // WHATSAPP CONFIG
        const WHATSAPP_NUMBER = "919000000000"; // Replace with your actual WhatsApp number

        // MAIN DATABASE
        let storeDatabase = [
            ["Onion", "500g, 1kg", "1.49, 2.79", "https://i.postimg.cc/yx2TwCSX/IMG-1455.png", false],
            ["Tomato", "500g, 1kg", "1.19, 1.99", "", false],
            ["Potato", "1kg, 2kg", "1.99, 3.49", "", false],
            ["Apple", "500g, 1kg", "2.49, 4.49", "", true],
            ["Banana", "1kg", "1.29", "", true],
            ["Carrot", "500g", "0.99", "", false]
        ];

        let cart = {};
        let currentTab = 'all';

        // Initialize Store
        window.onload = function() {
            renderStore();
        };

        // Render Store Products
        function renderStore() {
            const grid = document.getElementById('productsGrid');
            const searchVal = document.getElementById('searchInput').value.toLowerCase();
            grid.innerHTML = '';

            storeDatabase.forEach((item, index) => {
                const [name, variantsStr, pricesStr, imgUrl, isFruit] = item;
                
                // Filter tabs
                if (currentTab === 'veg' && isFruit) return;
                if (currentTab === 'fruit' && !isFruit) return;

                // Filter search
                if (searchVal && !name.toLowerCase().includes(searchVal)) return;

                const variants = variantsStr.split(',').map(v => v.trim());
                const prices = pricesStr.split(',').map(p => p.trim());

                // AUTOMATED IMAGE LOGIC (No more manual copy-pasting URL strings)
                // If imgUrl is empty, it automatically paths to your GitHub folder: images/ItemName.png
                let cleanedName = name.trim();
                let finalImgUrl = imgUrl ? imgUrl : `images/${cleanedName}.png`;

                // Set default variant if not already selected in cart
                const cartKeyBase = `item-${index}-`;
                let selectedVariantIdx = 0;
                
                // Check if this item already has a selected state in cart to preserve UI dropdown state
                variants.forEach((v, vIdx) => {
                    if(cart[cartKeyBase + vIdx]) selectedVariantIdx = vIdx;
                });

                let optionsHtml = '';
                variants.forEach((variant, vIdx) => {
                    optionsHtml += `<option value="${vIdx}" ${vIdx === selectedVariantIdx ? 'selected' : ''}>${variant} - ₹${prices[vIdx]}</option>`;
                });

                const productCard = `
                    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden flex flex-col justify-between relative group hover:shadow-md transition">
                        <div>
                            <div class="w-full aspect-square bg-gray-100 relative overflow-hidden">
                                <img src="${finalImgUrl}" alt="${name}" class="w-full h-full object-cover object-center" onerror="this.onerror=null; this.src='https://dummyimage.com/300x300/e2e8f0/0f172a.png&text=${encodeURIComponent(name)}';">
                            </div>
                            <div class="p-3">
                                <h4 class="font-black text-gray-800 text-sm leading-tight">${name}</h4>
                                <select id="select-${index}" onchange="updateCardUI(${index})" class="w-full mt-2 p-1.5 bg-gray-50 border border-gray-200 rounded-lg text-xs font-semibold text-gray-700 outline-none">
                                    ${optionsHtml}
                                </select>
                            </div>
                        </div>
                        <div class="p-3 pt-0">
                            <div id="action-box-${index}">
                                ${getActionBtnHtml(index, selectedVariantIdx, prices[selectedVariantIdx])}
                            </div>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', productCard);
            });
        }

        function getActionBtnHtml(itemIdx, variantIdx, price) {
            const cartKey = `item-${itemIdx}-${variantIdx}`;
            const qty = cart[cartKey] ? cart[cartKey].qty : 0;

            if (qty > 0) {
                return `
                    <div class="flex items-center justify-between bg-green-600 text-white rounded-xl p-1">
                        <button onclick="changeQty(${itemIdx}, ${variantIdx}, -1)" class="w-8 h-8 font-bold flex items-center justify-center hover:bg-green-700 rounded-lg transition">-</button>
                        <span class="font-bold text-sm">${qty}</span>
                        <button onclick="changeQty(${itemIdx}, ${variantIdx}, 1)" class="w-8 h-8 font-bold flex items-center justify-center hover:bg-green-700 rounded-lg transition">+</button>
                    </div>
                `;
            } else {
                return `
                    <button onclick="changeQty(${itemIdx}, ${variantIdx}, 1)" class="w-full bg-gray-900 hover:bg-gray-800 text-white text-xs font-bold py-2.5 px-4 rounded-xl transition flex items-center justify-center gap-1">
                        <i class="fa-solid fa-plus text-[10px]"></i> Add To Cart
                    </button>
                `;
            }
        }

        function updateCardUI(itemIdx) {
            const select = document.getElementById(`select-${itemIdx}`);
            const variantIdx = parseInt(select.value);
            const prices = storeDatabase[itemIdx][2].split(',').map(p => p.trim());
            const actionBox = document.getElementById(`action-box-${itemIdx}`);
            actionBox.innerHTML = getActionBtnHtml(itemIdx, variantIdx, prices[variantIdx]);
        }

        function changeQty(itemIdx, variantIdx, delta) {
            const cartKey = `item-${itemIdx}-${variantIdx}`;
            const item = storeDatabase[itemIdx];
            const name = item[0];
            const variant = item[1].split(',')[variantIdx].trim();
            const price = parseFloat(item[2].split(',')[variantIdx].trim());

            if (!cart[cartKey]) {
                cart[cartKey] = { name, variant, price, qty: 0 };
            }

            cart[cartKey].qty += delta;

            if (cart[cartKey].qty <= 0) {
                delete cart[cartKey];
            }

            updateCardUI(itemIdx);
            calculateCart();
        }

        function calculateCart() {
            let total = 0;
            let count = 0;

            for (let key in cart) {
                total += cart[key].price * cart[key].qty;
                count += cart[key].qty;
            }

            const bar = document.getElementById('floatingCart');
            if (count > 0) {
                bar.classList.remove('hidden');
                document.getElementById('cartCount').innerText = `${count} ${count === 1 ? 'Item' : 'Items'}`;
                document.getElementById('cartTotal').innerText = total.toFixed(2);
            } else {
                bar.classList.add('hidden');
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active', 'bg-green-600', 'text-white'));
            document.getElementById(`tab-${tab}`).classList.add('active', 'bg-green-600', 'text-white');
            renderStore();
        }

        function searchItems() {
            renderStore();
        }

        // Checkout Logic
        function openCheckout() {
            document.getElementById('checkoutModal').classList.remove('hidden');
            const summary = document.getElementById('checkoutSummary');
            summary.innerHTML = '';
            
            for (let key in cart) {
                const c = cart[key];
                summary.innerHTML += `
                    <div class="flex justify-between border-b border-gray-100 py-1">
                        <span>${c.name} (${c.variant}) x ${c.qty}</span>
                        <span class="font-semibold">₹${(c.price * c.qty).toFixed(2)}</span>
                    </div>
                `;
            }
        }

        function closeCheckout() {
            document.getElementById('checkoutModal').classList.add('hidden');
        }

        function submitOrder(e) {
            e.preventDefault();
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const address = document.getElementById('custAddress').value;

            let text = `*New Order Received!*\n\n`;
            text += `*Customer Details:*\n`;
            text += `Name: ${name}\n`;
            text += `Phone: ${phone}\n`;
            text += `Address: ${address}\n\n`;
            text += `*Order Items:*\n`;

            let grandTotal = 0;
            for (let key in cart) {
                const c = cart[key];
                const itemTotal = c.price * c.qty;
                grandTotal += itemTotal;
                text += `- ${c.name} (${c.variant}) x ${c.qty} : ₹${itemTotal.toFixed(2)}\n`;
            }
            text += `\n*Grand Total: ₹${grandTotal.toFixed(2)}*`;

            const url = `https://api.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=${encodeURIComponent(text)}`;
            window.open(url, '_blank');
        }

        // Admin Management Logic
        function toggleAdminModal() {
            const modal = document.getElementById('adminModal');
            modal.classList.toggle('hidden');
        }

        function verifyAdmin() {
            const pass = document.getElementById('adminPass').value;
            if (pass === 'snk2026') {
                document.getElementById('adminAuth').classList.add('hidden');
                document.getElementById('adminContent').classList.remove('hidden');
                renderAdminTable();
            } else {
                alert('Incorrect Passcode!');
            }
        }

        function renderAdminTable() {
            const tbody = document.getElementById('adminTableBody');
            tbody.innerHTML = '';
            storeDatabase.forEach((item, index) => {
                tbody.innerHTML += `
                    <tr id="admin-row-${index}">
                        <td><input type="text" value="${item[0]}" class="w-full p-1 text-sm border rounded"></td>
                        <td><input type="text" value="${item[1]}" class="w-full p-1 text-sm border rounded"></td>
                        <td><input type="text" value="${item[2]}" class="w-full p-1 text-sm border rounded"></td>
                        <td><input type="text" value="${item[3]}" placeholder="Optional (Auto paths to images/)" class="w-full p-1 text-sm border rounded"></td>
                        <td><input type="checkbox" ${item[4] ? 'checked' : ''} class="w-4 h-4 mt-2"></td>
                        <td><button onclick="deleteAdminRow(${index})" class="text-red-500 text-xs hover:underline">Delete</button></td>
                    </tr>
                `;
            });
        }

        function addAdminRow() {
            const tbody = document.getElementById('adminTableBody');
            const newIndex = tbody.children.length;
            tbody.insertAdjacentHTML('beforeend', `
                <tr id="admin-row-${newIndex}">
                    <td><input type="text" value="" placeholder="e.g. Garlic" class="w-full p-1 text-sm border rounded"></td>
                    <td><input type="text" value="" placeholder="250g, 500g" class="w-full p-1 text-sm border rounded"></td>
                    <td><input type="text" value="" placeholder="0.50, 0.90" class="w-full p-1 text-sm border rounded"></td>
                    <td><input type="text" value="" placeholder="Optional" class="w-full p-1 text-sm border rounded"></td>
                    <td><input type="checkbox" class="w-4 h-4 mt-2"></td>
                    <td><button onclick="this.closest('tr').remove()" class="text-red-500 text-xs hover:underline">Delete</button></td>
                </tr>
            `);
        }

        function deleteAdminRow(index) {
            document.getElementById(`admin-row-${index}`).remove();
        }

        function generateUpdateCode() {
            const tbody = document.getElementById('adminTableBody');
            const rows = tbody.querySelectorAll('tr');
            let updatedDB = [];

            rows.forEach(row => {
                const inputs = row.querySelectorAll('input');
                const name = inputs[0].value.trim();
                const variants = inputs[1].value.trim();
                const prices = inputs[2].value.trim();
                const imgUrl = inputs[3].value.trim();
                const isFruit = inputs[4].checked;

                if (name && variants && prices) {
                    updatedDB.push([name, variants, prices, imgUrl, isFruit]);
                }
            });

            storeDatabase = updatedDB;
            renderStore();

            const outputContainer = document.getElementById('outputContainer');
            const outputArea = document.getElementById('outputArea');
            outputArea.value = JSON.stringify(updatedDB, null, 4);
            outputContainer.classList.remove('hidden');
            alert('Store synchronized successfully! Code block generated below.');
        }
    </script>
</body>
</html>
